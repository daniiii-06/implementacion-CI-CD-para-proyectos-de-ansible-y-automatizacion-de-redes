name: CI/CD Ansible Network Automation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-test:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Ansible y dependencias
        run: |
          python -m pip install --upgrade pip
          pip install ansible yamllint ansible-lint

      - name: Verificar sintaxis YAML con yamllint
        run: |
          # Solo advertencias en caso de no cumplir estrictamente, no falla el job
          yamllint . || true

      - name: Ansible Syntax Check
        run: |
          ansible-playbook --syntax-check -i inventory/hosts.yml site.yml

  docker-build:
    name: Validar Build de Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t netdevops-ansible:test .
