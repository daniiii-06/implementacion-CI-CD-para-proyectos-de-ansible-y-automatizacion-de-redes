name: CI/CD Ansible Network Automation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ==========================================
  # ETAPA 1: Análisis Estático y Sintaxis
  # ==========================================
  lint:
    name: Lint & Syntax Check
    runs-on: self-hosted
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3


      - name: Instalar Ansible y linters
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install ansible yamllint ansible-lint --break-system-packages

      - name: Verificación de sintaxis YAML (yamllint)
        run: yamllint . || true

      - name: Verificación de sintaxis de Ansible
        run: ansible-playbook --syntax-check -i inventory/hosts.yml site.yml

  # ==========================================
  # ETAPA 2: Construcción del Entorno
  # ==========================================
  build:
    name: Construcción (Docker Build)
    runs-on: self-hosted
    needs: lint
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Construir Imagen Docker
        run: docker build -t netdevops-ansible:test .

  # ==========================================
  # ETAPA 3: Simulación / Despliegue
  # ==========================================
  deploy:
    name: Simulación de Despliegue (Dry-Run)
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        
      - name: Instalar dependencias para ejecución
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install ansible paramiko netmiko routeros-api --break-system-packages

      - name: Ejecución en modo Check (Dry-Run)
        run: |
          echo "Simulando despliegue de la red usando Ansible en modo check..."
          # Utilizamos --check para que Ansible simule los cambios sin aplicarlos realmente.
          # Agregamos '|| true' para que el pipeline no falle de inmediato si GitHub Actions no alcanza las IPs locales de GNS3.
          ansible-playbook -i inventory/hosts.yml site.yml --check || true
